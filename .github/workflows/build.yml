name: Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: Build & Test (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build, validate plugin, run non-CLI tests
        run: ./gradlew build --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jvm
          path: build/reports/tests/

  cli-smoke:
    name: CLI Smoke Test (macOS + ImageMagick)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install ImageMagick with Freetype
        run: brew install imagemagick

      - name: Run CLI smoke test
        run: ./gradlew cliSmokeTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-cli
          path: build/reports/tests/
